<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Трекер задач</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
    
<body>
    <div class="container">
        <!-- Левая панель -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-check-square"></i> TASKMASTER
            </div>
            <nav>
                <ul>
                    <li class="active" onclick="showView('dashboard')"><i class="fas fa-th-large"></i> Дашборд</li>
                    <li><i class="fas fa-list-ul"></i> Мои задачи</li>
                    <li><i class="fas fa-folder"></i> Проекты</li>
                    <li><i class="fas fa-calendar-alt"></i> Календарь</li>
                    <li><i class="fas fa-users"></i> Команда</li>
                    <li><i class="fas fa-cog"></i> Настройки</li>
                </ul>
            </nav>
            <button class="btn-new-task" onclick="openModal('createTaskModal')">+ Новая задача</button>
        </aside>

        <!-- Основной контент -->
        <main class="main-content" id="dashboard-view">
            <header>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Поиск...">
                </div>
                <div class="user-profile">
                    <i class="far fa-bell"></i>
                    <img src="https://i.pravatar.cc/40" alt="Avatar">
                    <span>Алексей С. <i class="fas fa-chevron-down"></i></span>
                </div>
            </header>

            <div class="dashboard-layout">
                <div class="tasks-section">
                    <h1>Панель задач</h1>
                    <h3>Мои активные задачи</h3>
                    <div id="tasks-list" class="tasks-list">

                        <!-- Задачи будут здесь -->
                    </div>
                </div>

                <!-- Календарь справа -->
                <aside class="calendar-sidebar">
                    <div class="calendar-header">
                        <span id="current-month">Октябрь 2023</span>
                    </div>
                    <div class="calendar-grid" id="calendar-week">

                        <!-- Дни недели (Пн-Вс) -->
                        <div class="day-name">Пн</div><div class="day-name">Вт</div><div class="day-name">Ср</div>
                        <div class="day-name">Чт</div><div class="day-name">Пт</div><div class="day-name">Сб</div>
                        <div class="day-name">Вс</div>

                        <!-- Числа месяца вставятся через JS -->
                    </div>
                </aside>
            </div>
        </main>

        <!-- Страница деталей задачи (скрыта по умолчанию) -->
        <main class="main-content task-details-view" id="task-details-view" style="display: none;">
            <button class="btn-back" onclick="showView('dashboard')"><i class="fas fa-arrow-left"></i> Назад к дашборду</button>
            <div id="full-task-content"></div>
        </main>
    </div>

    <!-- Модальное окно создания задачи -->
    <div id="createTaskModal" class="modal">
        <div class="modal-content">
            <h2>Создать новую задачу</h2>
            <form id="task-form">
                <input type="text" id="task-name" placeholder="Название задачи" required>
                <textarea id="task-desc" placeholder="Описание"></textarea>
                <div class="form-row">
                    <input type="date" id="task-deadline" required>
                    <select id="task-status">
                        <option value="В процессе">В процессе</option>
                        <option value="Готов">Готов</option>
                        <option value="Заморожен">Заморожен</option>
                    </select>
                </div>
                <div class="form-row">
                    <input type="text" id="task-tags" placeholder="Теги (через запятую)">
                    <input type="color" id="task-color" value="#ff6b00">
                </div>
                <div id="subtasks-container">
                    <h4>Подзадачи</h4>
                    <div id="subtasks-list-input"></div>
                    <button type="button" onclick="addSubtaskInput()">+ Добавить подзадачу</button>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeModal('createTaskModal')">Отмена</button>
                    <button type="submit" class="btn-save">Создать</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
